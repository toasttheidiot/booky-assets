<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Life 2</title>
    <style>

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .full-screen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #loading-message {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            z-index: 99;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.5rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <div id="loading-message">
            <h2>Its loading, Mr. Freeman</h2>
        </div>

        <iframe 
            id="main-iframe" 
            src="https://truffled.lol/games/hl2/index.html" 
            onload="hideLoader()">
        </iframe>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loading-message');
            loader.style.display = 'none';
        }
    </script>

</body>
</html>
